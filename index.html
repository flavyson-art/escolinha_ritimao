<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; --cinza: #aaa; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; 
            color: #fff;
            height: 100%;
            width: 100%;
        }

        /* TELA INICIAL - FORÇANDO VISIBILIDADE */
        #tela-inicial {
            display: flex !important; /* Força o flex no carregamento */
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            width: 100%;
            cursor: pointer; 
            text-align: center;
            background: #000;
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 9999; /* Garante que fique por cima de tudo */
            padding: 20px;
            box-sizing: border-box;
        }

        .titulo-principal { 
            font-size: clamp(2.5rem, 8vw, 6rem);
            text-transform: uppercase; font-weight: 900; margin: 0; letter-spacing: -2px; 
            text-shadow: 0 4px 10px rgba(255,255,255,0.2);
        }
        
        .sub-titulo { 
            letter-spacing: clamp(4px, 1.5vw, 10px);
            font-size: clamp(0.7rem, 2vw, 1.2rem); 
            color: var(--cinza); margin-bottom: 20px; 
        }
        
        .logo-ritimao { 
            width: clamp(250px, 40vw, 550px);
            height: clamp(250px, 40vw, 550px);
            border-radius: 50%; 
            border: clamp(8px, 1.5vw, 18px) solid #fff;
            margin: 40px 0; 
            object-fit: cover;
            box-shadow: 0 0 60px rgba(255,255,255,0.3);
            animation: logo-pulsar 3s infinite ease-in-out;
        }

        @keyframes logo-pulsar {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.3); }
            50% { transform: scale(1.04); box-shadow: 0 0 80px rgba(255,255,255,0.6); }
            100% { transform: scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.3); }
        }

        .touch-hint { color: #666; margin-top: 50px; font-weight: bold; letter-spacing: 2px; font-size: 1.1rem; }

        /* TELA DE CADASTRO */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            padding: clamp(20px, 5vw, 60px);
            box-sizing: border-box;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Fundo_tela_Cadastro.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            z-index: 10;
        }

        .container { 
            max-width: 550px;
            margin: 0 auto; 
            background: rgba(10, 10, 10, 0.95);
            padding: clamp(25px, 4vw, 40px);
            border-radius: 20px; 
            border: 1px solid #444;
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { margin-bottom: 8px; font-size: 0.8rem; color: #fff; text-transform: uppercase; font-weight: bold; text-shadow: 0 2px 4px #000; }
        input, select { padding: 16px; border: 1px solid #444; background: #000; color: #fff; border-radius: 10px; font-size: 1.1rem; }
        button { width: 100%; padding: 20px; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.2rem; text-transform: uppercase; }

        /* TELA FINAL */
        #tela-final { 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center; 
            background: #000; 
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10000;
        }

        .texto-informativo { color: var(--cinza); line-height: 1.6; margin-bottom: 40px; padding: 0 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p class="sub-titulo">ESCOLINHA DE BATERIA</p>
        <img src="https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Logo.jpg" 
             class="logo-ritimao" 
             alt="Ritimão" 
             onerror="this.src='https://via.placeholder.com/500/ffffff/000000?text=RITIMAO'">
        <p class="touch-hint">TOQUE PARA INICIAR</p>
    </div>

    <div id="tela-cadastro">
        <div class="container">
            <h2>MATRÍCULA 2024</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Nome do Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Escolha seu instrumento...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Xequere">Xequeré</option>
                    </select>
                </div>

                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px dashed #555; margin: 20px 0;">
                    <div class="campo"><label>Nº Sócio Gaviões</label><input type="text" id="campoNumSocio" class="mask-numero" required></div>
                    <div class="campo"><label>Foto da Carteirinha</label><input type="file" id="fotoSocio" accept="image/*" required></div>
                </div>

                <div class="campo"><label>Sua Foto (Perfil)</label><input type="file" id="foto" accept="image/*" required></div>
                <button type="submit" id="btnEnviar">FINALIZAR MATRÍCULA</button>
            </form>
        </div>
    </div>

    <div id="tela-final">
        <div style="font-size: 5rem;">🥁</div>
        <h2 style="text-transform: uppercase; font-weight: 900;">Cadastro Finalizado!</h2>
        <p class="texto-informativo">
            Sua matrícula foi recebida e agora será analisada pela nossa equipe.<br><br>
            Em breve, entraremos em contato com você através do <strong>WhatsApp</strong> ou <strong>E-mail</strong>.
        </p>
        <button onclick="location.reload()" style="max-width: 250px;">VOLTAR</button>
    </div>

    <script>
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('00000000');
            // Garante que a tela inicial esteja visível ao carregar
            $('#tela-inicial').show();
        });

        function abrirCadastro() {
            $('#tela-inicial').fadeOut(400, function() {
                $('#tela-cadastro').fadeIn(400);
                window.scrollTo(0,0);
            });
        }

        function validarMenor(idade) {
            if (idade > 0 && idade < 18) $('#dadosResponsavel').fadeIn();
            else $('#dadosResponsavel').hide();
        }

        const converter = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "ENVIANDO AGUARDE...";
            const URL_GAS = "https://script.google.com/macros/s/AKfycbzwEzDmY30Pzv7p_az6HV08NUWyCLB-uR42JekbZ2WP4kU86gxqEa_1yUkLTzW6yDttSw/exec";

            try {
                const f1 = await converter(document.getElementById('foto').files[0]);
                const f2 = await converter(document.getElementById('fotoSocio').files[0]);
                const payload = {
                    nome: $('#nome').val(), cpf: $('#cpf').val(), idade: $('#idade').val(),
                    sexo: $('#sexo').val(), telefone: $('#tel').val(), email: $('#email').val(),
                    instrumento: $('#instrumento').val(), numSocio: $('#campoNumSocio').val(),
                    nomeResp: $('#nomeResp').val() || "N/A", telResp: $('#telResp').val() || "N/A",
                    fotoBase64: f1, fotoSocioBase64: f2
                };
                await fetch(URL_GAS, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                $('#tela-cadastro').hide();
                $('#tela-final').css('display', 'flex').hide().fadeIn();
            } catch (err) {
                alert("Erro ao enviar. Tente novamente.");
                btn.disabled = false; btn.innerText = "FINALIZAR MATRÍCULA";
            }
        });
    </script>
</body>
</html>
