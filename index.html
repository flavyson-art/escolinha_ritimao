<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        /* RESET BÁSICO */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* TELA INICIAL - ELA É O PADRÃO */
        #tela-inicial {
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            width: 100%;
            text-align: center;
            background: #000;
            cursor: pointer;
            padding: 20px;
            box-sizing: border-box;
        }

        .titulo-principal { 
            font-size: clamp(2.5rem, 8vw, 6rem);
            text-transform: uppercase; font-weight: 900; margin: 0;
        }
        
        .sub-titulo { 
            letter-spacing: 5px; font-size: 1rem; color: #aaa; margin-bottom: 20px; 
        }
        
        .logo-ritimao { 
            width: clamp(250px, 45vw, 500px);
            height: auto;
            border-radius: 50%; 
            border: 10px solid #fff;
            margin: 30px 0; 
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
            animation: pulsar 3s infinite ease-in-out;
        }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .touch-hint { color: #555; font-weight: bold; margin-top: 30px; letter-spacing: 2px; }

        /* TELA DE CADASTRO - COMEÇA ESCONDIDA */
        #tela-cadastro { 
            display: none; 
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Fundo_tela_Cadastro.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .container { 
            max-width: 500px; margin: 0 auto; 
            background: rgba(15, 15, 15, 0.95);
            padding: 30px; border-radius: 20px; border: 1px solid #333;
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 18px; }
        label { margin-bottom: 8px; font-size: 0.8rem; color: #fff; text-transform: uppercase; font-weight: bold; }
        input, select { padding: 15px; border: 1px solid #444; background: #000; color: #fff; border-radius: 10px; font-size: 1rem; }
        
        button { 
            width: 100%; padding: 20px; background: #fff; color: #000; border: none; 
            font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.1rem; text-transform: uppercase;
        }

        /* TELA FINAL - SEM VERDE */
        #tela-final { 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; height: 100vh; background: #000;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p class="sub-titulo">ESCOLINHA DE BATERIA</p>
        <img src="https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Logo.jpg" 
             class="logo-ritimao" alt="Logo">
        <p class="touch-hint">TOQUE PARA INICIAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align: center;">MATRÍCULA ESCOLINHA 2026</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Nome do Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Escolha...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo">Surdo</option>
                        <option value="Tamborim">Tamborim</option>
                    </select>
                </div>

                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed #444; margin: 20px 0;">
                    <div class="campo"><label>Nº Sócio Gaviões</label><input type="text" id="campoNumSocio" class="mask-numero" required></div>
                    <div class="campo"><label>Foto Carteirinha</label><input type="file" id="fotoSocio" accept="image/*" required></div>
                </div>

                <div class="campo"><label>Sua Foto (Perfil)</label><input type="file" id="foto" accept="image/*" required></div>
                <button type="submit" id="btnEnviar">FINALIZAR MATRÍCULA</button>
            </form>
        </div>
    </div>

    <!-- TELA FINAL -->
    <div id="tela-final">
        <div style="font-size: 5rem;">🥁</div>
        <h2 style="text-transform: uppercase;">Cadastro Finalizado!</h2>
        <p style="color: #aaa; padding: 0 20px; line-height: 1.6;">
            Sua matrícula foi recebida e será analisada.<br>
            Entraremos em contato via <strong>WhatsApp</strong> ou <strong>E-mail</strong>.
        </p>
        <button onclick="location.reload()" style="max-width: 200px; margin-top: 30px;">VOLTAR</button>
    </div>

    <script>
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('00000000');
        });

        function abrirCadastro() {
            $('#tela-inicial').hide();
            $('#tela-cadastro').show();
            window.scrollTo(0,0);
        }

            if (idade > 0 && idade
