<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #fff;
        }

        /* TELA INICIAL */
        #tela-inicial {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; cursor: pointer; text-align: center;
            background: #000;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
        }

        .titulo-principal { font-size: 2.5rem; text-transform: uppercase; font-weight: 900; margin-bottom: 10px; }
        
        .logo-ritimao { 
            width: 200px; height: 200px; border-radius: 50%; 
            border: 3px solid #fff; margin: 20px 0; 
            object-fit: cover;
            background-color: #111;
            display: block;
        }

        /* TELA DE CADASTRO */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box;
            /* Degradê de segurança + Imagem com parâmetro de bypass de cache */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://i.imgur.com/vHqY7A2.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { 
            max-width: 450px; margin: 20px auto; 
            background: rgba(10, 10, 10, 0.95); 
            padding: 25px; border-radius: 12px; 
            border: 1px solid #333;
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { margin-bottom: 5px; font-size: 0.85rem; color: #aaa; }
        
        input, select { 
            padding: 12px; border: 1px solid #444; background: #000; 
            color: #fff; border-radius: 6px; font-size: 1rem;
        }

        button { 
            width: 100%; padding: 16px; background: #fff; 
            color: #000; border: none; font-weight: bold; 
            cursor: pointer; border-radius: 6px; margin-top: 10px;
        }

        .bloco-socio { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; 
            border-radius: 8px; border-left: 4px solid #fff; 
            margin: 20px 0; 
        }

        .hidden { display: none; }
        #tela-final { display: none; text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p style="letter-spacing: 3px; font-size: 0.8rem;">ESCOLINHA DE BATERIA</p>
        <!-- Forçamos o carregamento com crossOrigin -->
        <img src="https://i.imgur.com/vHqY7A2.jpeg" class="logo-ritimao" crossorigin="anonymous" alt="Logo">
        <p style="color: #888; margin-top: 20px;">TOQUE PARA INICIAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center;">MATRÍCULA</h2>
            <form id="formMatricula">
                
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Nome do Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Instagram</label><input type="text" id="redeSocial" placeholder="@"></div>

                <div class="campo">
                    <label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Xequere">Xequeré</option>
                    </select>
                </div>

                <div class="bloco-socio">
                    <div class="campo">
                        <label>Nº Sócio Gaviões da Fiel</label>
                        <input type="text" id="campoNumSocio" class="mask-numero" required>
                    </div>
                    <div class="campo">
                        <label>Foto da Carteirinha/Recibo</label>
                        <input type="file" id="fotoSocio" accept="image/*" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Sua Foto (Identificação)</label>
                    <input type="file" id="foto" accept="image/*" required>
                </div>

                <button type="submit" id="btnEnviar">CONCLUIR CADASTRO</button>
            </form>
        </div>
    </div>

    <!-- TELA FINAL -->
    <div id="tela-final">
        <div class="container">
            <h2 style="color: #4CAF50;">ENVIADO!</h2>
            <p>Cadastro realizado com sucesso.</p>
            <button onclick="location.reload()">VOLTAR</button>
        </div>
    </div>

    <script>
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('0000000000');
        });

        function abrirCadastro() {
            $('#tela-inicial').fadeOut();
            $('#tela-cadastro').fadeIn();
        }

        function validarMenor(idade) {
            if (idade > 0 && idade < 18) $('#dadosResponsavel').show();
            else $('#dadosResponsavel').hide();
        }

        const converter = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "ENVIANDO...";

            const URL_GAS = "https://script.google.com/macros/s/AKfycbzwEzDmY30Pzv7p_az6HV08NUWyCLB-uR42JekbZ2WP4kU86gxqEa_1yUkLTzW6yDttSw/exec";

            try {
                const fotoA = await converter(document.getElementById('foto').files[0]);
                const fotoS = await converter(document.getElementById('fotoSocio').files[0]);

                const payload = {
                    nome: $('#nome').val(),
                    cpf: $('#cpf').val(),
                    idade: $('#idade').val(),
                    sexo: $('#sexo').val(),
                    telefone: $('#tel').val(),
                    email: $('#email').val(),
                    redeSocial: $('#redeSocial').val(),
                    instrumento: $('#instrumento').val(),
                    numSocio: $('#campoNumSocio').val(),
                    nomeResp: $('#nomeResp').val() || "N/A",
                    telResp: $('#telResp').val() || "N/A",
                    fotoBase64: fotoA,
                    fotoSocioBase64: fotoS
                };

                const resp = await fetch(URL_GAS, { method: 'POST', body: JSON.stringify(payload) });
                const final = await resp.json();

                if (final.status === "sucesso") {
                    $('#tela-cadastro').hide();
                    $('#tela-final').show();
                } else {
                    alert(final.msg);
                    btn.disabled = false; btn.innerText = "CONCLUIR CADASTRO";
                }
            } catch (err) {
                alert("Erro ao enviar dados.");
                btn.disabled = false; btn.innerText = "CONCLUIR CADASTRO";
            }
        });
    </script>
</body>
</html>
