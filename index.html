<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritimão - Cadastro</title>
    <!-- Scripts carregados no topo para evitar atraso -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; 
            color: #fff;
            height: 100%;
            width: 100%;
        }

        /* TELA INICIAL - FORCEI A SOBREPOSIÇÃO */
        #tela-inicial {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 10000; /* Valor altíssimo para garantir que fique na frente */
            cursor: pointer;
            text-align: center;
        }

        .titulo-principal { font-size: 2.5rem; text-transform: uppercase; font-weight: 900; margin: 0; }
        .logo-img { width: 220px; height: 220px; border-radius: 50%; border: 3px solid #fff; margin: 20px 0; object-fit: cover; }

        /* TELA DE CADASTRO */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            width: 100%;
            padding: 20px; 
            box-sizing: border-box;
            background-image: url('https://i.imgur.com/vHqY7A2.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { 
            max-width: 480px; 
            margin: 20px auto; 
            background: rgba(0, 0, 0, 0.93); 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #444;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
        }

        /* Ajustes de formulário */
        .campo { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; text-align: left; }
        input, select { padding: 14px; border: 1px solid #333; background: #111; color: #fff; border-radius: 8px; font-size: 1rem; }
        button { 
            width: 100%; padding: 18px; background: #fff; color: #000; 
            border: none; font-weight: bold; border-radius: 8px; cursor: pointer; 
            font-size: 1.1rem; margin-top: 15px;
        }
        .bloco-socio { background: #151515; padding: 15px; border-radius: 10px; border-left: 5px solid #fff; margin: 20px 0; }
        .hidden { display: none !important; }
        .rodape { text-align: center; font-size: 0.7rem; color: #555; margin-top: 20px; letter-spacing: 1px; }

        #tela-sucesso { display: none; text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL: O clique aqui DEVE disparar a função -->
    <div id="tela-inicial" onclick="entrar()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p style="letter-spacing: 5px; font-size: 0.7rem; color: #bbb;">ESCOLINHA DE BATERIA</p>
        <img src="https://i.imgur.com/vHqY7A2.jpeg" class="logo-img" alt="Logo">
        <p style="color: #666; font-weight: bold; animate: pulse 2s infinite;">TOQUE PARA CONTINUAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center; margin-top:0;">MATRÍCULA 2024</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="checarIdade(this.value)"></div>

                <div id="sessaoResponsavel" class="hidden">
                    <div class="campo"><label>Nome do Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>WhatsApp</label>
                    <input type="text" id="tel" class="mask-tel" required>
                </div>

                <div class="campo">
                    <label>Instrumento de Interesse</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo">Surdo</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                    </select>
                </div>

                <div class="bloco-socio">
                    <div class="campo">
                        <label>Nº Sócio Gaviões da Fiel</label>
                        <input type="text" id="socio" class="mask-numero" required>
                    </div>
                    <div class="campo">
                        <label>Foto da Carteirinha</label>
                        <input type="file" id="imgSocio" accept="image/*" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Sua Foto (Perfil)</label>
                    <input type="file" id="imgAluno" accept="image/*" required>
                </div>

                <button type="submit" id="btn">FINALIZAR MATRÍCULA</button>
            </form>
            <div class="rodape">BATERIA RITIMÃO - GAVIÕES DA FIEL</div>
        </div>
    </div>

    <!-- TELA SUCESSO -->
    <div id="tela-sucesso">
        <div class="container">
            <h1 style="color: #4CAF50;">TUDO PRONTO!</h1>
            <p>Seu cadastro foi enviado para a diretoria.</p>
            <button onclick="window.top.location.reload()">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <script>
        // FUNÇÃO DE ENTRADA (JavaScript Puro para evitar erros)
        function entrar() {
            try {
                document.getElementById('tela-inicial').style.display = 'none';
                document.getElementById('tela-cadastro').style.display = 'block';
                window.scrollTo(0,0);
            } catch(e) {
                alert("Erro ao abrir: " + e);
            }
        }

        // Aplicação de máscaras via jQuery
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('0000000000');
        });

        function checarIdade(valor) {
            if(valor > 0 && valor < 18) {
                $('#sessaoResponsavel').removeClass('hidden');
            } else {
                $('#sessaoResponsavel').addClass('hidden');
            }
        }

        // Conversor de Imagem
        const converter = (f) => new Promise(res => {
            const r = new FileReader();
            r.readAsDataURL(f);
            r.onload = () => res(r.result);
        });

        // Envio do Formulário
        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const b = document.getElementById('btn');
            b.disabled = true; b.innerText = "ENVIANDO AGUARDE...";

            try {
                const f1 = document.getElementById('imgAluno').files[0];
                const f2 = document.getElementById('imgSocio').files[0];

                const dados = {
                    nome: $('#nome').val(),
                    cpf: $('#cpf').val(),
                    idade: $('#idade').val(),
                    tel: $('#tel').val(),
                    instrumento: $('#instrumento').val(),
                    socio: $('#socio').val(),
                    nomeResp: $('#nomeResp').val() || "N/A",
                    telResp: $('#telResp').val() || "N/A",
                    fotoAluno: await converter(f1),
                    fotoSocio: await converter(f2)
                };

                // Link do seu Web App
                const URL = "https://script.google.com/macros/s/AKfycbzwEzDmY30Pzv7p_az6HV08NUWyCLB-uR42JekbZ2WP4kU86gxqEa_1yUkLTzW6yDttSw/exec";

                await fetch(URL, { 
                    method: 'POST', 
                    mode: 'no-cors', // Importante para o Google Script
                    body: JSON.stringify(dados) 
                });

                document.getElementById('tela-cadastro').style.display = 'none';
                document.getElementById('tela-sucesso').style.display = 'block';

            } catch (err) {
                alert("Erro no envio: " + err);
                b.disabled = false; b.innerText = "FINALIZAR MATRÍCULA";
            }
        });
    </script>
</body>
</html>
