<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Escolinha Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
		<style>
			:root { 
			--preto: #000; 
			--branco: #fff; 
			--cinza: #333; 
			--sombra-texto: 2px 2px 10px rgba(255, 255, 255, 0.3);
		}
    
		body, html { margin: 0; padding: 0; font-family: 'Arial Black', Gadget, sans-serif; background-color: var(--preto); color: var(--branco); overflow: hidden; }

		/* TELA INICIAL */
		#tela-inicial {
        display: flex; 
        flex-direction: column;
        justify-content: center; 
        align-items: center; 
        height: 100vh;
        cursor: pointer;
        text-align: center;
        background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
		}

		/* TÍTULO IMPONENTE */
		.titulo-principal {
			font-size: 3.5em;
			text-transform: uppercase;
			letter-spacing: 5px;
			margin-bottom: 20px;
			color: var(--branco);
			text-shadow: 4px 4px 0px var(--cinza), 0 0 20px rgba(255,255,255,0.2);
			animation: surgir 1.5s ease-out;
		}

		/* EFEITO NA IMAGEM (PULSAÇÃO DE BATERIA) */
		.logo-container {
			position: relative;
			animation: bater 2s infinite ease-in-out;
		}

		#tela-inicial img { 
			max-width: 350px; 
			border-radius: 50%; /* Se o logo for redondo fica perfeito */
			box-shadow: 0 0 50px rgba(255,255,255,0.1);
			border: 4px solid var(--branco);
		}

		.clique-aviso {
			margin-top: 30px;
			font-size: 1.2em;
			letter-spacing: 2px;
			color: #888;
			text-transform: uppercase;
			animation: piscar 1.5s infinite;
		}

		/* ANIMAÇÕES */
		@keyframes bater {
			0% { transform: scale(1); filter: brightness(1); }
			5% { transform: scale(1.05); filter: brightness(1.2); } /* O "golpe" do surdo */
			15% { transform: scale(1); filter: brightness(1); }
		}

		@keyframes surgir {
			from { opacity: 0; transform: translateY(-50px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@keyframes piscar {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.3; }
		}

		/* Ajuste para celular */
			@media (max-width: 600px) {
			.titulo-principal { font-size: 1.8em; letter-spacing: 2px; }
			#tela-inicial img { max-width: 250px; }
		}
	</style>

	<div id="tela-inicial" onclick="abrirCadastro()">
		<h1 class="titulo-principal">Escolinha de Bateria<br>Ritimão</h1>
    
		<div class="logo-container">
			<img src="Logo.jpg" alt="Logo Ritimão Gaviões">
		</div>

		<p class="clique-aviso">Toque na tela para iniciar o cadastro</p>
	</div>

    <script>
        // Máscaras JQuery
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
        });

        function abrirCadastro() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-cadastro').style.display = 'block';
        }

        function validarMenor(idade) {
            const div = document.getElementById('dadosResponsavel');
            div.classList.toggle('hidden', idade >= 18);
            document.getElementById('nomeResp').required = idade < 18;
            document.getElementById('telResp').required = idade < 18;
        }

        // Função para converter arquivo de foto em Base64 (Texto para envio)
        const converterBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- PASSO 4 ATUALIZADO: ENVIO REAL ---
        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Processando Matrícula...";

            // URL do seu Google Apps Script (Sempre verifique se a URL está correta)
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIq5q-sPjQFZoYNZAxOkCxltFfPwS6zGSN6JP8k9jftRMZbfcFub4-Hpwo8F9dzZHp/exec";

            try {
                const arquivoFoto = document.getElementById('foto').files[0];
                let fotoBase64 = "";
                if (arquivoFoto) {
                    fotoBase64 = await converterBase64(arquivoFoto);
                }

                const payload = {
                    nome: document.getElementById('nome').value,
                    cpf: document.getElementById('cpf').value,
                    idade: document.getElementById('idade').value,
                    sexo: document.getElementById('sexo').value,
                    telefone: document.getElementById('tel').value,
                    email: document.getElementById('email').value,
                    instrumento: document.getElementById('instrumento').value,
                    nivel: document.getElementById('nivel').value,
                    isSocio: document.getElementById('isSocio').value,
                    numSocio: document.getElementById('campoNumSocio').value || "N/A",
                    nomeResp: document.getElementById('nomeResp').value || "N/A",
                    telResp: document.getElementById('telResp').value || "N/A",
                    fotoBase64: fotoBase64
                };

                // Envio para o Google
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const resultado = await response.json();

                if (resultado.status === "sucesso") {
                    alert("✅ MATRÍCULA REALIZADA COM SUCESSO!\nBem-vindo à Ritimão!");
                    location.reload(); // Volta para a tela inicial
                } else {
                    alert("❌ ATENÇÃO: " + resultado.msg);
                    btn.disabled = false;
                    btn.innerText = "Finalizar Inscrição";
                }

            } catch (erro) {
                console.error(erro);
                // Como o Google as vezes bloqueia o retorno do JSON (CORS), tratamos como sucesso se os dados caírem na planilha
                alert("Verifique sua planilha. Se os dados não aparecerem, tente novamente.");
                btn.disabled = false;
                btn.innerText = "Finalizar Inscrição";
            }
        });
    </script>
</body>
</html>
