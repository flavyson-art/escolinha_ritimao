<!-- Mantenha seu <head> e os estilos CSS exatamente como estão -->

<script>
    $(document).ready(function(){
        // Aplica as máscaras nos campos de entrada
        $('.mask-cpf').mask('000.000.000-00');
        $('.mask-tel').mask('(00) 00000-0000');
        $('.mask-numero').mask('00000000');
    });

    // Função para transição da tela inicial para o formulário
    function abrirCadastro() {
        $('#tela-inicial').fadeOut(300, function() {
            $('#tela-cadastro').fadeIn(400);
            window.scrollTo(0,0);
        });
    }

    // Gerencia campos obrigatórios para menores de idade
    function validarMenor(idade) {
        if (idade > 0 && idade < 18) {
            $('#dadosResponsavel').removeClass('hidden');
            $('#nomeResp, #telResp').prop('required', true);
        } else {
            $('#dadosResponsavel').addClass('hidden');
            $('#nomeResp, #telResp').prop('required', false);
        }
    }

    // Converte arquivos (fotos) para Base64 para envio ao Drive
    const converter = (file) => new Promise((resolve, reject) => {
        if (!file) { resolve(null); return; }
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // Processamento do formulário no envio
    document.getElementById('formMatricula').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            // Converte as duas fotos em paralelo
            const fotoPerfil = await converter(document.getElementById('foto').files[0]);
            const fotoSocio = await converter(document.getElementById('fotoSocio').files[0]);

            const payload = {
                nome: $('#nome').val(),
                cpf: $('#cpf').val(),
                idade: $('#idade').val(),
                sexo: $('#sexo').val(),
                telefone: $('#tel').val(),
                email: $('#email').val(),
                redeSocial: $('#redeSocial').val(),
                instrumento: $('#instrumento').val(),
                numSocio: $('#campoNumSocio').val(),
                nomeResp: $('#nomeResp').val() || "N/A",
                telResp: $('#telResp').val() || "N/A",
                fotoBase64: fotoPerfil,
                fotoSocioBase64: fotoSocio
            };

            // Chama a função no Apps Script (Código.gs)
            google.script.run
                .withSuccessHandler(function(resposta) {
                    if (resposta.status === "sucesso") {
                        $('#tela-cadastro').fadeOut(300, function() {
                            $('#tela-final').css('display', 'flex').hide().fadeIn(400);
                        });
                    } else {
                        // Exibe erros de CPF inválido, duplicado ou falta de vagas
                        alert("⚠️ " + resposta.msg);
                        btn.disabled = false;
                        btn.innerText = "FINALIZAR MATRÍCULA";
                    }
                })
                .withFailureHandler(function(erro) {
                    alert("Erro técnico no servidor: " + erro);
                    btn.disabled = false;
                    btn.innerText = "FINALIZAR MATRÍCULA";
                })
                .processarFormulario(payload);

        } catch (err) {
            alert("Erro ao processar os dados ou fotos. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "FINALIZAR MATRÍCULA";
        }
    });
</script>
</body>
</html>
