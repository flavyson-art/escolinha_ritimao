<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Escolinha Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #fff;
            overflow-x: hidden;
        }

        /* TELA INICIAL */
        #tela-inicial {
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            width: 100%;
            cursor: pointer; 
            text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            position: fixed; /* Garante que ela fique sobreposta no início */
            top: 0; left: 0; z-index: 999;
        }

        .titulo-principal { font-size: clamp(1.5rem, 8vw, 3.5rem); text-transform: uppercase; font-weight: 900; line-height: 1; }
        #tela-inicial img { width: 220px; height: 220px; border-radius: 50%; border: 3px solid #fff; margin: 20px 0; }

        /* TELA DE CADASTRO */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            width: 100%;
            padding: 20px; 
            box-sizing: border-box;
            background-color: #000;
            background-image: url('https://i.imgur.com/vHqY7A2.jpeg'); 
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .container { 
            max-width: 450px; 
            margin: 20px auto; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Estilos de Formulário */
        .campo { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { margin-bottom: 5px; font-size: 0.85rem; color: #bbb; text-align: left; }
        input, select { 
            padding: 12px; border: 1px solid #444; background: #111; 
            color: #fff; border-radius: 6px; font-size: 1rem;
        }
        button { 
            width: 100%; padding: 16px; background: #fff; 
            color: #000; border: none; font-weight: 800; 
            cursor: pointer; border-radius: 6px; margin-top: 10px;
            text-transform: uppercase;
        }
        .bloco-socio { background: #1a1a1a; padding: 15px; border-radius: 8px; border-left: 4px solid #fff; margin-bottom: 15px; }
        .hidden { display: none; }
        .rodape-marca { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #666; font-weight: bold; }
        
        #tela-finalizacao { display: none; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO<br><span style="font-size: 0.4em; letter-spacing: 4px;">ESCOLINHA DE BATERIA</span></h1>
        <img src="https://i.imgur.com/vHqY7A2.jpeg" alt="Logo" onerror="this.src='https://via.placeholder.com/200?text=LOGO'">
        <p style="color: #888; letter-spacing: 2px; font-size: 0.9rem;">CLIQUE PARA INICIAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center; margin-top:0;">MATRÍCULA</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Tel. Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Rede Social</label><input type="text" id="redeSocial" placeholder="@seuusuario"></div>

                <div class="campo">
                    <label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Xequere">Xequeré</option>
                    </select>
                </div>

                <div class="bloco-socio">
                    <div class="campo">
                        <label>Número de Sócio Gaviões</label>
                        <input type="text" id="campoNumSocio" class="mask-numero" placeholder="Apenas números" required>
                    </div>
                    <div class="campo">
                        <label>Foto da Carteirinha/Recibo</label>
                        <input type="file" id="fotoSocio" accept="image/*" required>
                    </div>
                </div>

                <div class="campo"><label>Foto do Aluno</label><input type="file" id="foto" accept="image/*" required></div>

                <button type="submit" id="btnEnviar">CONCLUIR CADASTRO</button>
            </form>
            <div class="rodape-marca">Bateria Ritimão – Unida – Forte – Vencedora</div>
        </div>
    </div>

    <!-- TELA FINALIZACAO -->
    <div id="tela-finalizacao">
        <div class="container">
            <h2 style="color: #4CAF50;">CADASTRO OK!</h2>
            <p>Recebemos seus dados. Entraremos em contato em breve.</p>
            <button onclick="location.reload()">VOLTAR</button>
        </div>
    </div>

    <script>
        // Função para garantir que as máscaras carreguem
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('0000000000');
        });

        function abrirCadastro() {
            // Usa jQuery para garantir compatibilidade no deploy do Google
            $('#tela-inicial').fadeOut(300, function(){
                $('#tela-cadastro').fadeIn(300);
            });
            window.scrollTo(0,0);
        }

        function validarMenor(idade) {
            if(idade < 18) $('#dadosResponsavel').removeClass('hidden');
            else $('#dadosResponsavel').addClass('hidden');
        }

        // Validação de CPF simplificada
        function validaCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
            return true; // Simplificado para o exemplo, mas funcional
        }

        const redimensionar = (file) => new Promise((resolve) => {
            if (!file) { resolve(null); return; }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 600;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                    else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            
            if(!validaCPF($('#cpf').val())) { alert("CPF Inválido"); return; }

            btn.disabled = true; btn.innerText = "ENVIANDO...";

            try {
                const fotoA = await redimensionar(document.getElementById('foto').files[0]);
                const fotoB = await redimensionar(document.getElementById('fotoSocio').files[0]);

                const payload = {
                    nome: $('#nome').val(),
                    cpf: $('#cpf').val(),
                    idade: $('#idade').val(),
                    sexo: $('#sexo').val(),
                    telefone: $('#tel').val(),
                    email: $('#email').val(),
                    redeSocial: $('#redeSocial').val(),
                    instrumento: $('#instrumento').val(),
                    numSocio: $('#campoNumSocio').val(),
                    nomeResp: $('#nomeResp').val() || "N/A",
                    telResp: $('#telResp').val() || "N/A",
                    fotoBase64: fotoA,
                    fotoSocioBase64: fotoB
                };

                const url = "https://script.google.com/macros/s/AKfycbzwEzDmY30Pzv7p_az6HV08NUWyCLB-uR42JekbZ2WP4kU86gxqEa_1yUkLTzW6yDttSw/exec";
                
                await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                
                $('#tela-cadastro').hide();
                $('#tela-finalizacao').show();
            } catch (err) {
                alert("Erro ao enviar. Verifique a internet.");
                btn.disabled = false; btn.innerText = "CONCLUIR CADASTRO";
            }
        });
    </script>
</body>
</html>
