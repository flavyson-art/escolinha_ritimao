<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Escolinha Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js" defer></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; --dourado: #f1c40f; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--preto); 
            color: var(--branco); 
        }

        /* Tela Inicial */
        #tela-inicial {
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            cursor: pointer; 
            text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .titulo-principal { font-size: clamp(1.5rem, 8vw, 3.5rem); text-transform: uppercase; font-weight: 900; line-height: 1; }
        #tela-inicial img { width: 200px; height: 200px; border-radius: 50%; border: 3px solid var(--branco); margin: 20px 0; }

        /* Tela de Cadastro com a Imagem de Fundo */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            padding: 40px 20px; 
            box-sizing: border-box;
            /* AQUI ENTRA SUA IMAGEM DE COLAGEM */
            background-image: url('Fundo_tela_Cadastro.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        /* Efeito de Nitidez no Formulário (Glassmorphism) */
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: rgba(0, 0, 0, 0.85); /* Fundo escuro semi-transparente */
            backdrop-filter: blur(10px); /* Desfoca o fundo para destacar o form */
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 15px; width: 100%; }
        label { margin-bottom: 5px; font-size: 0.85rem; color: #ddd; text-transform: uppercase; font-weight: bold; }
        
        input, select { 
            padding: 12px; 
            border: 1px solid #444; 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border-radius: 8px; 
            font-size: 1rem; 
            width: 100%;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--branco); outline: none; background: rgba(255, 255, 255, 0.1); }

        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--branco); 
            color: var(--preto); 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { opacity: 0.9; }

        .rodape-marca {
            text-align: center; margin-top: 30px; font-size: 0.75rem;
            letter-spacing: 2px; color: #aaa; font-weight: bold; text-transform: uppercase;
        }

        #tela-finalizacao { display: none; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .hidden { display: none; }
        .bloco-socio { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; border-left: 4px solid var(--branco); margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO<br><span style="font-size: 0.4em; color: #888;">ESCOLINHA DE BATERIA</span></h1>
        <img src="Logo.jpg" alt="Logo">
        <p style="color: #888; letter-spacing: 3px; font-size: 0.8rem;">TOQUE PARA INICIAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center; margin-bottom:25px; letter-spacing: 2px;">FICHA DE MATRÍCULA</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Responsável (Pai/Mãe)</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Tel. Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Rede Social</label><input type="text" id="redeSocial" placeholder="@seuusuario"></div>

                <div class="campo">
                    <label>Instrumento de Interesse</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Xequere">Xequeré</option>
                    </select>
                </div>

                <div class="bloco-socio">
                    <div class="campo">
                        <label>Nº Sócio Gaviões da Fiel</label>
                        <input type="text" id="campoNumSocio" class="mask-numero" placeholder="Apenas números" required>
                    </div>
                    <div id="areaAnexo" class="campo">
                        <label>Foto da Carteirinha/Recibo</label>
                        <input type="file" id="fotoSocio" accept="image/*" required>
                    </div>
                </div>

                <div class="campo"><label>Sua Foto (Identificação)</label><input type="file" id="foto" accept="image/*" required></div>

                <button type="submit" id="btnEnviar">CONCLUIR CADASTRO</button>
            </form>
            
            <div class="rodape-marca">Bateria Ritimão – Unida Forte Vencedora</div>
        </div>
    </div>

    <!-- TELA FINALIZACAO -->
    <div id="tela-finalizacao">
        <div class="container" style="text-align:center;">
            <h2 style="color: #4CAF50;">CADASTRO RECEBIDO!</h2>
            <p style="line-height: 1.6; color: #ddd;">Sua solicitação foi enviada para nossa diretoria. Entraremos em contato via WhatsApp após a avaliação.</p>
            <button onclick="location.reload()" style="background: #333; color: #fff;">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('0000000000');
        };

        function abrirCadastro() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-cadastro').style.display = 'block';
            window.scrollTo(0,0);
        }

        function validarMenor(idade) {
            document.getElementById('dadosResponsavel').classList.toggle('hidden', idade >= 18);
        }

        function validaCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length !== 11 || !!cpf.match(/(\d)\1{10}/)) return false;
            let soma = 0, resto;
            for (let i = 1; i <= 9; i++) soma = soma + parseInt(cpf.substring(i-1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto == 10) || (resto == 11)) resto = 0;
            if (resto != parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma = soma + parseInt(cpf.substring(i-1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto == 10) || (resto == 11)) resto = 0;
            if (resto != parseInt(cpf.substring(10, 11))) return false;
            return true;
        }

        const redimensionarEConverter = (file) => new Promise((resolve) => {
            if (!file) { resolve(null); return; }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const cpfVal = document.getElementById('cpf').value;
            const numSocioVal = document.getElementById('campoNumSocio').value.trim();
            const arquivoSocio = document.getElementById('fotoSocio').files[0];

            if(!validaCPF(cpfVal)){ alert("CPF Inválido!"); return; }
            if(!/^\d+$/.test(numSocioVal)){ alert("Número de sócio inválido!"); return; }
            if(!arquivoSocio){ alert("Anexe a foto da carteirinha!"); return; }

            btn.disabled = true; btn.innerText = "ENVIANDO...";

            const SCRIPT_URL = "SUA_URL_DO_GOOGLE_APPS_SCRIPT";

            try {
                const fotoBase64 = await redimensionarEConverter(document.getElementById('foto').files[0]);
                const fotoSocioBase64 = await redimensionarEConverter(arquivoSocio);

                const payload = {
                    nome: document.getElementById('nome').value,
                    cpf: cpfVal,
                    idade: document.getElementById('idade').value,
                    sexo: document.getElementById('sexo').value,
                    telefone: document.getElementById('tel').value,
                    email: document.getElementById('email').value,
                    redeSocial: document.getElementById('redeSocial').value || "Não informado",
                    instrumento: document.getElementById('instrumento').value,
                    numSocio: numSocioVal,
                    nomeResp: document.getElementById('nomeResp').value || "N/A",
                    telResp: document.getElementById('telResp').value || "N/A",
                    fotoBase64: fotoBase64,
                    fotoSocioBase64: fotoSocioBase64
                };

                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const res = await response.json();

                if (res.status === "sucesso") {
                    document.getElementById('tela-cadastro').style.display = 'none';
                    document.getElementById('tela-finalizacao').style.display = 'flex';
                } else {
                    alert("Erro: " + res.msg);
                    btn.disabled = false; btn.innerText = "CONCLUIR CADASTRO";
                }
            } catch (err) {
                alert("Erro de conexão.");
                btn.disabled = false; btn.innerText = "CONCLUIR CADASTRO";
            }
        });
    </script>
</body>
</html>
