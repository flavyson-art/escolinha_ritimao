<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; --cinza: #aaa; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }
        #tela-inicial { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; text-align: center; background: var(--preto); cursor: pointer; padding: 20px; box-sizing: border-box; }
        .titulo-principal { font-size: clamp(2.5rem, 8vw, 6rem); text-transform: uppercase; font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .sub-titulo { letter-spacing: 5px; font-size: 1rem; color: var(--cinza); margin-bottom: 20px; }
        .logo-ritimao { width: clamp(250px, 45vw, 500px); height: auto; border-radius: 50%; border: 10px solid var(--branco); margin: 30px 0; box-shadow: 0 0 50px rgba(255,255,255,0.2); animation: pulsar 3s infinite ease-in-out; }
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .touch-hint { color: #555; font-weight: bold; margin-top: 30px; letter-spacing: 2px; text-transform: uppercase; }
        #tela-cadastro { display: none; padding: 40px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Fundo_tela_Cadastro.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(10, 10, 10, 0.95); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .campo { display: flex; flex-direction: column; margin-bottom: 18px; }
        label { margin-bottom: 8px; font-size: 0.75rem; color: var(--branco); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        input, select { padding: 15px; border: 1px solid #444; background: #000; color: #fff; border-radius: 10px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--branco); outline: none; }
        button { width: 100%; padding: 20px; background: var(--branco); color: var(--preto); border: none; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 1.1rem; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ccc; transform: translateY(-2px); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #tela-final { display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100vh; background: #000; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p class="sub-titulo">ESCOLINHA DE BATERIA</p>
        <img src="https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Logo.jpg" class="logo-ritimao" alt="Logo">
        <p class="touch-hint">Toque para iniciar sua matrícula</p>
    </div>

    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px;">Matrícula 2026</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #fff;">
                        <label>Nome do Responsável</label><input type="text" id="nomeResp" style="margin-bottom:10px">
                        <label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel">
                    </div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                
                <div class="campo"><label>Instagram / Rede Social</label><input type="text" id="redeSocial" placeholder="@seuusuario"></div>

                <div class="campo"><label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo">Surdo</option>
                        <option value="Tamborim">Tamborim</option>
                    </select>
                </div>

                <div class="campo"><label>Nº Sócio</label><input type="text" id="campoNumSocio" class="mask-numero" required></div>
                <div class="campo"><label>Foto Carteirinha (Sócio)</label><input type="file" id="fotoSocio" accept="image/*" required></div>
                <div class="campo"><label>Sua Foto de Perfil</label><input type="file" id="foto" accept="image/*" required></div>
                
                <button type="submit" id="btnEnviar">FINALIZAR MATRÍCULA</button>
            </form>
        </div>
    </div>

    <div id="tela-final">
        <div style="font-size: 5rem; margin-bottom: 20px;">🥁</div>
        <h2 style="text-transform: uppercase; font-weight: 900; letter-spacing: 2px;">Cadastro Recebido!</h2>
        <p style="color: #aaa; line-height: 1.6; max-width: 500px; margin-bottom: 30px;">
            Sua matrícula foi enviada com sucesso e agora será analisada pela nossa equipe.<br><br>
            Fique atento! Entraremos em contato em breve via <strong>WhatsApp</strong> ou <strong>E-mail</strong> para confirmar sua vaga.
        </p>
        <button onclick="location.reload()" style="max-width: 250px;">VOLTAR AO INÍCIO</button>
    </div>

<script>
    $(document).ready(function(){
        $('.mask-cpf').mask('000.000.000-00');
        $('.mask-tel').mask('(00) 00000-0000');
        $('.mask-numero').mask('00000000');
    });

    function abrirCadastro() {
        $('#tela-inicial').fadeOut(300, function() {
            $('#tela-cadastro').fadeIn(400);
            window.scrollTo(0,0);
        });
    }

    function validarMenor(idade) {
        if (idade > 0 && idade < 18) { 
            $('#dadosResponsavel').removeClass('hidden'); 
            $('#nomeResp, #telResp').prop('required', true);
        } else { 
            $('#dadosResponsavel').addClass('hidden'); 
            $('#nomeResp, #telResp').prop('required', false);
        }
    }

    function testaCPF(cpf) {
        cpf = cpf.replace(/\D/g, '');
        if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
        let soma = 0, resto;
        for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
        resto = (soma * 10) % 11;
        if ((resto === 10) || (resto === 11)) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;
        soma = 0;
        for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
        resto = (soma * 10) % 11;
        if ((resto === 10) || (resto === 11)) resto = 0;
        if (resto !== parseInt(cpf.substring(10, 11))) return false;
        return true;
    }

    const converterEComprimir = (file) => new Promise((resolve) => {
        if (!file) { resolve(null); return; }
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const MAX = 800;
                let w = img.width; let h = img.height;
                if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
        };
    });

    document.getElementById('formMatricula').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const cpfValor = $('#cpf').val();

        if (!testaCPF(cpfValor)) {
            alert("O CPF digitado é INVÁLIDO. Por favor, confira os números.");
            $('#cpf').focus();
            return;
        }

        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";

        try {
            const f1 = await converterEComprimir(document.getElementById('foto').files[0]);
            const f2 = await converterEComprimir(document.getElementById('fotoSocio').files[0]);

            const payload = {
                nome: $('#nome').val(),
                cpf: cpfValor,
                idade: $('#idade').val(),
                sexo: $('#sexo').val(),
                telefone: $('#tel').val(),
                email: $('#email').val(),
                redeSocial: $('#redeSocial').val() || "N/A",
                instrumento: $('#instrumento').val(),
                numSocio: $('#campoNumSocio').val(),
                nomeResp: $('#nomeResp').val() || "N/A",
                telResp: $('#telResp').val() || "N/A",
                fotoBase64: f1,
                fotoSocioBase64: f2
            };

            const url = "https://script.google.com/macros/s/AKfycbwO2TjelyNlhhtNPs_EhqNfHo-KViavc3oKcGXx672GumDpSZmWzpjCm8x8ccatu_p3EA/exec";
            
            $.ajax({
                url: url,
                method: "POST",
                dataType: "json",
                data: JSON.stringify(payload),
                success: function(response) {
                    if (response.status === "sucesso") {
                        $('#tela-cadastro').fadeOut(300, function() {
                            $('#tela-final').css('display', 'flex').hide().fadeIn(400);
                        });
                    } else {
                        alert("ATENÇÃO: " + response.msg);
                        btn.disabled = false;
                        btn.innerText = "FINALIZAR MATRÍCULA";
                    }
                },
                error: function() {
                    $('#tela-cadastro').fadeOut(300, function() {
                        $('#tela-final').css('display', 'flex').hide().fadeIn(400);
                    });
                }
            });

        } catch (err) {
            alert("Erro no processamento das fotos.");
            btn.disabled = false;
            btn.innerText = "FINALIZAR MATRÍCULA";
        }
    });
</script>
</body>
</html>
