<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Escolinha Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js" defer></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; --cinza: #222; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--preto); color: var(--branco); }

        #tela-inicial {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; cursor: pointer; text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .titulo-principal { font-size: clamp(1.5rem, 8vw, 3.5rem); text-transform: uppercase; font-weight: 900; }
        #tela-inicial img { width: 250px; height: 250px; border-radius: 50%; border: 3px solid var(--branco); margin: 20px 0; }

        #tela-cadastro { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .container { 
            max-width: 450px; margin: auto; background: #111; 
            padding: 25px; border-radius: 12px; border: 1px solid #333; 
        }

        /* AJUSTE DE ALINHAMENTO */
        .campo { display: flex; flex-direction: column; margin-bottom: 15px; width: 100%; }
        label { margin-bottom: 5px; font-size: 0.9rem; color: #bbb; text-align: left; }
        input, select { 
            padding: 12px; border: 1px solid #333; background: #000; 
            color: #fff; border-radius: 6px; font-size: 1rem; width: 100%;
            box-sizing: border-box; /* Garante que o padding não estoure a largura */
        }

        button { 
            width: 100%; padding: 15px; background: var(--branco); 
            color: var(--preto); border: none; font-weight: 800; 
            cursor: pointer; border-radius: 6px; margin-top: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO<br><span style="font-size: 0.4em;">ESCOLINHA DE BATERIA</span></h1>
        <img src="Logo.jpg" alt="Logo">
        <p style="color: #666; letter-spacing: 2px;">TOQUE PARA INICIAR</p>
    </div>

    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center; margin-bottom:20px;">MATRÍCULA</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Tel. Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Rede Social</label><input type="text" id="redeSocial" placeholder="@seuusuario"></div>

                <div class="campo">
                    <label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Xequere">Xequeré</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Nível</label>
                    <select id="nivel">
                        <option value="Iniciante">Iniciante</option>
                        <option value="Intermediário">Intermediário</option>
                        <option value="Avançado">Avançado</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Sócio Gaviões?</label>
                    <select id="isSocio" onchange="document.getElementById('campoNumSocio').classList.toggle('hidden', this.value !== 'Sim')">
                        <option value="Não">Não</option><option value="Sim">Sim</option>
                    </select>
                    <input type="text" id="campoNumSocio" class="hidden" placeholder="Nº Sócio" style="margin-top:8px">
                </div>

                <div class="campo"><label>Foto (Identificação)</label><input type="file" id="foto" accept="image/*" required></div>

                <button type="submit" id="btnEnviar">CADASTRAR</button>
            </form>
        </div>
    </div>

    <script>
        window.onload = () => {
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
        };

        function abrirCadastro() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-cadastro').style.display = 'block';
        }

        function validarMenor(idade) {
            document.getElementById('dadosResponsavel').classList.toggle('hidden', idade >= 18);
        }

        const redimensionarEConverter = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwEzDmY30Pzv7p_az6HV08NUWyCLB-uR42JekbZ2WP4kU86gxqEa_1yUkLTzW6yDttSw/exec";

            try {
                const fotoBase64 = await redimensionarEConverter(document.getElementById('foto').files[0]);

                const payload = {
                    nome: document.getElementById('nome').value,
                    cpf: document.getElementById('cpf').value,
                    idade: document.getElementById('idade').value,
                    sexo: document.getElementById('sexo').value,
                    telefone: document.getElementById('tel').value,
                    email: document.getElementById('email').value,
                    redeSocial: document.getElementById('redeSocial').value || "Não informado",
                    instrumento: document.getElementById('instrumento').value,
                    nivel: document.getElementById('nivel').value,
                    isSocio: document.getElementById('isSocio').value,
                    numSocio: document.getElementById('campoNumSocio').value || "N/A",
                    nomeResp: document.getElementById('nomeResp').value || "N/A",
                    telResp: document.getElementById('telResp').value || "N/A",
                    obs: "Inscrição Web",
                    fotoBase64: fotoBase64
                };

                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const res = await response.json();

                if (res.status === "sucesso") {
                    alert("✅ MATRÍCULA REALIZADA!");
                    location.reload();
                } else {
                    alert("❌ " + res.msg);
                    btn.disabled = false; btn.innerText = "CADASTRAR";
                }
            } catch (err) {
                alert("Erro ao enviar. Verifique a URL do Script.");
                btn.disabled = false; btn.innerText = "CADASTRAR";
            }
        });
    </script>
</body>
</html>
