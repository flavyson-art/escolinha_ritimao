<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #fff;
            overflow-x: hidden;
        }

        /* TELA INICIAL */
        #tela-inicial {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; cursor: pointer; text-align: center;
            background: #000;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
        }

        .titulo-principal { font-size: 3.5rem; text-transform: uppercase; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .sub-titulo { letter-spacing: 6px; font-size: 0.8rem; color: #aaa; margin-bottom: 20px; }
        
        /* LOGO AMPLIADA COM ANIMAÇÃO */
        .logo-ritimao { 
            width: 250px; /* Aumentado de 180px para 250px */
            height: 250px; 
            border-radius: 50%; 
            border: 10px solid #fff; /* Borda mais robusta */
            margin: 30px 0; 
            object-fit: cover;
            box-shadow: 0 0 40px rgba(255,255,255,0.4);
            animation: logo-pulsar 2.5s infinite ease-in-out;
        }

        @keyframes logo-pulsar {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255,255,255,0.3); }
            50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(255,255,255,0.6); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,255,255,0.3); }
        }

        /* TELA DE CADASTRO */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Fundo_tela_Cadastro.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .container { 
            max-width: 450px; margin: 10px auto; 
            background: rgba(17, 17, 17, 0.95);
            padding: 30px; border-radius: 15px; 
            border: 1px solid #333;
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { margin-bottom: 6px; font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: bold; }
        
        input, select { 
            padding: 14px; border: 1px solid #333; background: #000; 
            color: #fff; border-radius: 8px; font-size: 1rem;
        }
        
        input:focus { border-color: #fff; }

        button { 
            width: 100%; padding: 18px; background: #fff; 
            color: #000; border: none; font-weight: 900; 
            cursor: pointer; border-radius: 8px; margin-top: 15px;
            font-size: 1rem; text-transform: uppercase;
        }

        .bloco-socio { 
            background: rgba(255, 255, 255, 0.03); padding: 15px; 
            border-radius: 10px; border: 1px dashed #444;
            margin: 20px 0; 
        }

        .hidden { display: none; }
        #tela-final { display: none; text-align: center; padding: 100px 20px; }
        
        @keyframes hint-pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .touch-hint { color: #555; margin-top: 40px; animation: hint-pulse 2s infinite; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p class="sub-titulo">ESCOLINHA DE BATERIA</p>
        
        <img src="https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Logo.jpg" 
             class="logo-ritimao" 
             alt="Ritimão" 
             onerror="this.src='https://via.placeholder.com/300/ffffff/000000?text=RITIMAO'">
        
        <p class="touch-hint">TOQUE PARA INICIAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center; margin-top:0;">MATRÍCULA</h2>
            <form id="formMatricula">
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Nome do Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                
                <div class="campo"><label>Rede Social (Instagram/Face)</label><input type="text" id="redeSocial" placeholder="@exemplo"></div>
                
                <div class="campo">
                    <label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Escolha seu instrumento...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Xequere">Xequeré</option>
                    </select>
                </div>

                <div class="bloco-socio">
                    <div class="campo">
                        <label>Nº Sócio Gaviões</label>
                        <input type="text" id="campoNumSocio" class="mask-numero" required>
                    </div>
                    <div class="campo">
                        <label>Foto da Carteirinha</label>
                        <input type="file" id="fotoSocio" accept="image/*" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Sua Foto (Perfil)</label>
                    <input type="file" id="foto" accept="image/*" required>
                </div>

                <button type="submit" id="btnEnviar">ENVIAR INSCRIÇÃO</button>
            </form>
        </div>
    </div>

    <div id="tela-final">
        <h1 style="font-size: 4rem;">🥁</h1>
        <h2>CADASTRO ENVIADO!</h2>
        <p style="color: #888;">Seja bem-vindo à Ritimão.</p>
        <button onclick="location.reload()" style="max-width: 200px;">VOLTAR</button>
    </div>

    <script>
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('00000000');
        });

        function abrirCadastro() {
            $('#tela-inicial').fadeOut(300, function() {
                $('#tela-cadastro').show();
            });
        }

        function validarMenor(idade) {
            if (idade > 0 && idade < 18) $('#dadosResponsavel').fadeIn();
            else $('#dadosResponsavel').hide();
        }

        const converter = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "ENVIANDO...";

            const URL_GAS = "https://script.google.com/macros/s/AKfycbzwEzDmY30Pzv7p_az6HV08NUWyCLB-uR42JekbZ2WP4kU86gxqEa_1yUkLTzW6yDttSw/exec";

            try {
                const fotoA = await converter(document.getElementById('foto').files[0]);
                const fotoS = await converter(document.getElementById('fotoSocio').files[0]);

                const payload = {
                    nome: $('#nome').val(),
                    cpf: $('#cpf').val(),
                    idade: $('#idade').val(),
                    sexo: $('#sexo').val(),
                    telefone: $('#tel').val(),
                    email: $('#email').val(),
                    redeSocial: $('#redeSocial').val(),
                    instrumento: $('#instrumento').val(),
                    numSocio: $('#campoNumSocio').val(),
                    nomeResp: $('#nomeResp').val() || "N/A",
                    telResp: $('#telResp').val() || "N/A",
                    fotoBase64: fotoA,
                    fotoSocioBase64: fotoS
                };

                const resp = await fetch(URL_GAS, { method: 'POST', body: JSON.stringify(payload) });
                const final = await resp.json();

                if (final.status === "sucesso") {
                    $('#tela-cadastro').hide();
                    $('#tela-final').fadeIn();
                } else {
                    alert(final.msg);
                    btn.disabled = false; btn.innerText = "ENVIAR INSCRIÇÃO";
                }
            } catch (err) {
                alert("Erro ao conectar com a planilha.");
                btn.disabled = false; btn.innerText = "ENVIAR INSCRIÇÃO";
            }
        });
    </script>
</body>
</html>
