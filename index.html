<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #fff;
        }

        /* TELA INICIAL */
        #tela-inicial {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; cursor: pointer; text-align: center;
            background: #000;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
        }

        .titulo-principal { font-size: 2.5rem; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        
        /* LOGO EM BASE64 (Funciona mesmo sem internet ou bloqueio) */
        .logo-ritimao { 
            width: 180px; height: 180px; border-radius: 50%; 
            border: 3px solid #fff; margin: 20px 0; 
            object-fit: cover;
            background: #111;
        }

        /* TELA DE CADASTRO */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://i.imgur.com/vHqY7A2.jpeg') center/cover no-repeat fixed;
        }

        .container { 
            max-width: 450px; margin: 10px auto; 
            background: rgba(15, 15, 15, 0.98); 
            padding: 25px; border-radius: 12px; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { margin-bottom: 5px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; font-weight: bold; }
        
        input, select { 
            padding: 12px; border: 1px solid #444; background: #000; 
            color: #fff; border-radius: 6px; font-size: 1rem;
            outline: none;
        }
        
        input:focus, select:focus { border-color: #fff; }

        button { 
            width: 100%; padding: 16px; background: #fff; 
            color: #000; border: none; font-weight: 900; 
            cursor: pointer; border-radius: 6px; margin-top: 10px;
            text-transform: uppercase;
        }

        .bloco-socio { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; 
            border-radius: 8px; border-left: 4px solid #fff; 
            margin: 20px 0; 
        }

        .hidden { display: none; }
        #tela-final { display: none; text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicial" onclick="abrirCadastro()">
        <h1 class="titulo-principal">RITIMÃO</h1>
        <p style="letter-spacing: 5px; font-size: 0.7rem; color: #ccc;">ESCOLINHA DE BATERIA</p>
        
        <!-- IMAGEM COM REDIRECIONAMENTO DE SEGURANÇA -->
        <img src="https://images2.imgbox.com/71/84/Xw6mK0XW_o.jpg" class="logo-ritimao" alt="Logo Ritimão">
        
        <p style="color: #666; margin-top: 30px; font-size: 0.9rem; animation: pulse 1.5s infinite;">TOQUE PARA INICIAR</p>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro">
        <div class="container">
            <h2 style="text-align:center; letter-spacing: 2px;">MATRÍCULA 2026</h2>
            <form id="formMatricula">
                
                <div class="campo"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF</label><input type="text" id="cpf" class="mask-cpf" required></div>
                <div class="campo"><label>Idade</label><input type="number" id="idade" required onchange="validarMenor(this.value)"></div>

                <div id="dadosResponsavel" class="hidden">
                    <div class="campo"><label>Nome do Responsável</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="campo"><label>Instagram</label><input type="text" id="redeSocial" placeholder="@"></div>

                <div class="campo">
                    <label>Instrumento</label>
                    <select id="instrumento" required>
                        <option value="">Selecione...</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Chocalho">Chocalho</option>
                        <option value="Cuica">Cuíca</option>
                        <option value="Repique">Repique</option>
                        <option value="Surdo 1">Surdo 1</option>
                        <option value="Surdo 2">Surdo 2</option>
                        <option value="Surdo 3">Surdo 3</option>
                        <option value="Tamborim">Tamborim</option>
                        <option value="Timbal">Timbal</option>
                        <option value="Xequere">Xequeré</option>
                    </select>
                </div>

                <div class="bloco-socio">
                    <div class="campo">
                        <label>Nº Sócio Gaviões da Fiel</label>
                        <input type="text" id="campoNumSocio" class="mask-numero" required>
                    </div>
                    <div class="campo">
                        <label>Foto da Carteirinha/Recibo</label>
                        <input type="file" id="fotoSocio" accept="image/*" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Sua Foto (Identificação)</label>
                    <input type="file" id="foto" accept="image/*" required>
                </div>

                <button type="submit" id="btnEnviar">FINALIZAR AGORA</button>
            </form>
        </div>
    </div>

    <!-- TELA FINAL -->
    <div id="tela-final">
        <div class="container">
            <h2 style="color: #fff;">✅ SUCESSO!</h2>
            <p>Seus dados foram enviados para a diretoria da Ritimão.</p>
            <button onclick="location.reload()">NOVO CADASTRO</button>
        </div>
    </div>

    <script>
        $(document).ready(function(){
            $('.mask-cpf').mask('000.000.000-00');
            $('.mask-tel').mask('(00) 00000-0000');
            $('.mask-numero').mask('0000000000');
        });

        function abrirCadastro() {
            $('#tela-inicial').fadeOut();
            $('#tela-cadastro').fadeIn();
        }

        function validarMenor(idade) {
            if (idade > 0 && idade < 18) $('#dadosResponsavel').show();
            else $('#dadosResponsavel').hide();
        }

        const converter = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        document.getElementById('formMatricula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "PROCESSANDO...";

            const URL_GAS = "
