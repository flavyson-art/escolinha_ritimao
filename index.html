<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ritimão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <style>
        :root { --preto: #000; --branco: #fff; --cinza: #aaa; --cinza-escuro: #444; }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; 
            color: #fff;
            overflow-x: hidden;
            height: 100%;
        }

        /* =========================================
           TELA INICIAL - FOCO RESPONSIVO
           ========================================= */
        #tela-inicial {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; cursor: pointer; text-align: center;
            background: #000;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .titulo-principal { 
            font-size: clamp(2.5rem, 8vw, 6rem);
            text-transform: uppercase; font-weight: 900; margin: 0; letter-spacing: -2px; 
            text-shadow: 0 4px 10px rgba(255,255,255,0.2);
        }
        .sub-titulo { 
            letter-spacing: clamp(4px, 1.5vw, 10px);
            font-size: clamp(0.7rem, 2vw, 1.2rem); 
            color: var(--cinza); margin-bottom: 20px; 
        }
        
        .logo-ritimao { 
            width: clamp(250px, 40vw, 550px);
            height: clamp(250px, 40vw, 550px);
            border-radius: 50%; 
            border: clamp(8px, 1.5vw, 18px) solid #fff;
            margin: 40px 0; 
            object-fit: cover;
            box-shadow: 0 0 60px rgba(255,255,255,0.3);
            animation: logo-pulsar 3s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        @keyframes logo-pulsar {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.3); }
            50% { transform: scale(1.04); box-shadow: 0 0 80px rgba(255,255,255,0.6); }
            100% { transform: scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.3); }
        }

        .touch-hint { color: #666; margin-top: 50px; font-weight: bold; letter-spacing: 2px; font-size: 1.1rem; }

        /* =========================================
           TELA DE CADASTRO - ALTO CONTRASTE
           ========================================= */
        #tela-cadastro { 
            display: none; 
            min-height: 100vh; 
            padding: clamp(20px, 5vw, 60px);
            box-sizing: border-box;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Fundo_tela_Cadastro.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .container { 
            max-width: 550px;
            margin: 0 auto; 
            background: rgba(10, 10, 10, 0.9);
            padding: clamp(25px, 4vw, 40px);
            border-radius: 20px; 
            border: 1px solid var(--cinza-escuro);
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }

        #tela-cadastro h2 { 
            text-align: center; margin-top: 0; color: #fff; font-size: 2.2rem; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .campo { display: flex; flex-direction: column; margin-bottom: 20px; }
        
        label { 
            margin-bottom: 8px; font-size: 0.8rem; color: #fff;
            text-transform: uppercase; font-weight: bold; letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        input, select { 
            padding: 16px; border: 1px solid var(--cinza-escuro); background: #000; 
            color: #fff; border-radius: 10px; font-size: 1.1rem;
            transition: border-color 0.3s;
        }
        
        input:focus { border-color: #fff; outline: none; }

        button { 
            width: 100%; padding: 20px; background: #fff; 
            color: #000; border: none; font-weight: 900; 
            cursor: pointer; border-radius: 10px; margin-top: 20px;
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s;
        }
        button:hover { background: #eee; transform: translateY(-2px); }

        .bloco-socio { 
            background: rgba(255, 255, 255, 0.05); padding: 20px; 
            border-radius: 12px; border: 1px dashed #555;
            margin: 30px 0; 
        }

        /* =========================================
           TELA FINAL - SEM VERDE / MENSAGEM NOVA
           ========================================= */
        #tela-final { 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center; 
            padding: 40px 20px; 
            background: #000; 
            height: 100vh;
            box-sizing: border-box;
        }

        .icone-sucesso { font-size: 5rem; margin-bottom: 20px; color: #fff; }
        
        .titulo-final { 
            font-size: clamp(1.8rem, 5vw, 2.8rem); 
            color: #fff; text-transform: uppercase; font-weight: 900; 
            margin-bottom: 20px;
        }

        .texto-informativo { 
            color: var(--cinza); 
            font-size: clamp(1rem, 2vw, 1.2rem); 
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        @media (max-width: 480px) {
            .logo-ritimao { border-width: 8px; }
            .container { padding: 20px; }
            input, select, button { padding: 14px; font-size: 1rem; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!--
